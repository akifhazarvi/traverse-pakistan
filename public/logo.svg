<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" fill="none">

  <!-- ===== CIRCLE EMBLEM ===== -->
  <defs>
    <clipPath id="c">
      <circle cx="40" cy="40" r="34.5"/>
    </clipPath>
  </defs>

  <!-- Outer ring -->
  <circle cx="40" cy="40" r="37.5" stroke="#3E7A6E" stroke-width="2.5" fill="white"/>

  <!-- Purple/indigo sky background -->
  <circle cx="40" cy="40" r="34.5" fill="#6264A8"/>

  <!-- Stars scattered across sky -->
  <circle cx="14" cy="14" r="0.9"  fill="white" opacity="0.9"/>
  <circle cx="28" cy="10" r="0.7"  fill="white" opacity="0.85"/>
  <circle cx="50" cy="13" r="0.8"  fill="white" opacity="0.8"/>
  <circle cx="64" cy="18" r="0.6"  fill="white" opacity="0.85"/>
  <circle cx="22" cy="22" r="0.55" fill="white" opacity="0.7"/>
  <circle cx="57" cy="10" r="0.65" fill="white" opacity="0.75"/>
  <circle cx="10" cy="26" r="0.5"  fill="white" opacity="0.65"/>
  <circle cx="68" cy="24" r="0.55" fill="white" opacity="0.7"/>
  <circle cx="9"  cy="19" r="0.6"  fill="white" opacity="0.6"/>
  <circle cx="71" cy="15" r="0.5"  fill="white" opacity="0.65"/>
  <circle cx="36" cy="7"  r="0.6"  fill="white" opacity="0.8"/>
  <circle cx="44" cy="9"  r="0.5"  fill="white" opacity="0.7"/>
  <circle cx="18" cy="32" r="0.45" fill="white" opacity="0.5"/>
  <circle cx="66" cy="32" r="0.45" fill="white" opacity="0.5"/>

  <!-- ===== MOUNTAIN — white snow body ===== -->
  <!-- Main snow face: large central peak, white -->
  <polygon points="40,11 7,67 73,67"
           fill="white" clip-path="url(#c)"/>

  <!-- Right-side shadow face (dark teal) -->
  <polygon points="40,11 52,30 66,56 73,67 53,67"
           fill="#3E7A6E" clip-path="url(#c)" opacity="0.82"/>

  <!-- Central crevice / rock shadow (darker teal, narrow) -->
  <polygon points="40,11 37,22 38,34 42,50 45,67 40,67 37,48 36,32 38,20"
           fill="#2C5C52" clip-path="url(#c)" opacity="0.9"/>

  <!-- Rock face block centre-lower -->
  <polygon points="34,67 38,50 43,51 46,67"
           fill="#3E7A6E" clip-path="url(#c)" opacity="0.75"/>

  <!-- Rock outcrop lower-left -->
  <polygon points="7,67 16,52 24,60 22,67"
           fill="#3E7A6E" clip-path="url(#c)" opacity="0.65"/>

  <!-- Rock outcrop lower-right -->
  <polygon points="57,67 60,53 68,60 73,67"
           fill="#2C5C52" clip-path="url(#c)" opacity="0.55"/>

  <!-- Snow ground field at base -->
  <rect x="0" y="63" width="80" height="12" fill="white" clip-path="url(#c)"/>

  <!-- Curved bottom text: "HAPPY BE THE BOUNTEOUS REALM" -->
  <path id="arc-bottom" d="M 9,58 A 32,32 0 0,0 71,58" fill="none"/>
  <text font-size="5.1" fill="#3E7A6E"
        font-family="Georgia, 'Times New Roman', serif"
        letter-spacing="1.3">
    <textPath href="#arc-bottom" startOffset="1%">HAPPY BE THE BOUNTEOUS REALM</textPath>
  </text>

  <!-- ===== BRAND NAME ===== -->
  <!-- "TRAVERSE" — ultra-light, very wide tracking -->
  <text x="97" y="31"
        font-size="14"
        fill="#4A4838"
        font-weight="300"
        font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        letter-spacing="9">TRAVERSE</text>

  <!-- "PAKISTAN" — extra bold, strong presence -->
  <text x="94" y="62"
        font-size="28"
        fill="#4A4838"
        font-weight="800"
        font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        letter-spacing="1.5">PAKISTAN</text>

</svg>
