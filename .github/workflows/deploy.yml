name: Deploy to GitHub Pages (internal preview)

# This workflow builds the site for static hosting on GitHub Pages.
# It is NOT the production deploy — production ships to Vercel from `main`
# with full image optimization, edge headers, and revalidating sitemap.
#
# GitHub Pages previews:
#   - Served at https://<owner>.github.io/traverse-pakistan/
#   - Fully noindex'd (robots.txt + <meta name="robots">)
#   - Supabase auth + bookings work because Supabase is called from the browser
#   - Triggered on push to main, or manually on any branch via workflow_dispatch

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: "true"
      # GITHUB_PAGES_BASE_PATH defaults to /traverse-pakistan.
      # Override here only if the repo name differs.
      # GITHUB_PAGES_BASE_PATH: "/my-repo-name"
      NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build

      - name: Add .nojekyll (so _next paths are served as-is)
        run: touch ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./out"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
